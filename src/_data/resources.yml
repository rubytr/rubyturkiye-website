books:
  - title: "Programming Ruby 3.3"
    author: "Dave Thomas"
    description_tr: "Ruby'nin anahtarı. Her Ruby geliştiricisinin okuması gereken temel başvuru kaynağı."
    description_en: "The Pickaxe Book. The essential reference every Ruby developer should read."
  - title: "The Well-Grounded Rubyist"
    author: "David A. Black"
    description_tr: "Ruby'nin derinliklerine inen, dili gerçekten anlamak için mükemmel bir kaynak."
    description_en: "Dives deep into Ruby's internals — perfect for truly understanding the language."
  - title: "Eloquent Ruby"
    author: "Russ Olsen"
    description_tr: "Idiomatic, Ruby tarzı kod yazmayı öğreten klasik bir kitap."
    description_en: "A classic guide to writing idiomatic, Ruby-style code."
  - title: "POODR"
    author: "Sandi Metz"
    description_tr: "Ruby'de nesne yönelimli tasarım prensiplerini öğrenmek için en iyi kaynak."
    description_en: "The best book for learning object-oriented design principles in Ruby."
  - title: "Rails 8 Up and Running"
    author: "Jeremy McAnally"
    description_tr: "Rails 8'in tüm yeni özelliklerini kapsayan güncel bir başlangıç rehberi."
    description_en: "An up-to-date beginner's guide covering all new Rails 8 features."

courses:
  - name: "GoRails"
    provider: "gorails.com"
    description_tr: "Haftalık Rails screencasts. Her inceliği öğrenmek için en kapsamlı kaynak."
    description_en: "Weekly Rails screencasts. The best resource for mastering every Rails nuance."
  - name: "The Odin Project"
    provider: "theodinproject.com"
    description_tr: "Ücretsiz, kapsamlı Ruby ve Rails yolu. Sıfırdan başlayanlar için ideal."
    description_en: "Free, comprehensive Ruby and Rails path. Ideal for those starting from scratch."
  - name: "Upcase by Thoughtbot"
    provider: "thoughtbot.com"
    description_tr: "TDD, refactoring ve Ruby best practices üzerine odaklanan kaliteli içerik."
    description_en: "Quality content focused on TDD, refactoring, and Ruby best practices."
  - name: "Learn Ruby on Rails"
    provider: "Udemy"
    description_tr: "Türkçe altyazı seçeneği mevcut. Başlangıç seviyesi için kapsamlı kurs."
    description_en: "Comprehensive beginner-level course with Turkish subtitle option available."
  - name: "RailsCasts"
    provider: "railscasts.com"
    description_tr: "Ryan Bates'in klasik screencast serisi. Hâlâ değerli içerikler barındırıyor."
    description_en: "Ryan Bates' classic screencast series. Still holds valuable content."

links:
  - name: "ruby-lang.org"
    description_tr: "Resmi Ruby web sitesi, belgeler ve indirme."
    description_en: "Official Ruby website, docs, and downloads."
    url: "https://ruby-lang.org"
  - name: "rubygems.org"
    description_tr: "Ruby gem deposu ve paket yönetimi."
    description_en: "The Ruby gem repository and package management."
    url: "https://rubygems.org"
  - name: "rubyonrails.org"
    description_tr: "Rails framework'ün resmi sitesi."
    description_en: "Official Rails framework website."
    url: "https://rubyonrails.org"
  - name: "ruby-toolbox.com"
    description_tr: "Gem karşılaştırma ve popülerlik istatistikleri."
    description_en: "Gem comparison and popularity statistics."
    url: "https://www.ruby-toolbox.com"
  - name: "ruby.social"
    description_tr: "Ruby geliştiricilerinin Mastodon topluluğu."
    description_en: "Mastodon community for Ruby developers."
    url: "https://ruby.social"
  - name: "APIdock"
    description_tr: "Ruby, Rails ve RSpec API referansı."
    description_en: "API reference for Ruby, Rails, and RSpec."
    url: "https://apidock.com"
